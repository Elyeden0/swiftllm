# llm-proxy configuration

# Port to listen on
port = 8080

# Authentication — leave api_keys empty to disable auth
[auth]
api_keys = ["your-proxy-api-key"]

# Routing configuration
[routing]
default_provider = "openai"

# Response cache (for non-streaming requests)
[cache]
enabled = true
max_size = 1000       # max cached responses
ttl_seconds = 300     # cache entry lifetime

# Rate limiting (per provider, token bucket algorithm)
[rate_limit]
enabled = true
max_requests = 100    # default limit for all providers
window_seconds = 60   # time window

# Optional per-provider overrides
[rate_limit.providers.openai]
max_requests = 200
window_seconds = 60

[rate_limit.providers.anthropic]
max_requests = 50
window_seconds = 60

# ── Providers ──

[providers.gemini]
kind = "gemini"
api_key = "your-gemini-api-key"
priority = 3
models = [
    "gemini-2.0-flash",
    "gemini-2.0-pro",
    "gemini-1.5-pro",
    "gemini-1.5-flash",
]

[providers.openai]
kind = "openai"
api_key = "sk-your-openai-key"
priority = 1
models = [
    "gpt-4o",
    "gpt-4o-mini",
    "gpt-4.1",
    "gpt-4.1-mini",
    "gpt-4.1-nano",
    "o3",
    "o3-mini",
    "o4-mini",
]

[providers.anthropic]
kind = "anthropic"
api_key = "sk-ant-your-anthropic-key"
priority = 2
models = [
    "claude-sonnet-4-6",
    "claude-opus-4-6",
    "claude-haiku-4-5-20251001",
]

[providers.mistral]
kind = "mistral"
api_key = "your-mistral-api-key"
priority = 4
models = [
    "mistral-large-latest",
    "mistral-small-latest",
    "codestral-latest",
    "ministral-8b-latest",
    "pixtral-large-latest",
]

[providers.ollama]
kind = "ollama"
base_url = "http://localhost:11434"
priority = 10
models = [
    "llama3:latest",
    "mistral:latest",
    "codellama:latest",
]
