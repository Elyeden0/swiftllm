# llm-proxy configuration
port = 8080

# Authentication — leave api_keys empty to disable auth
[auth]
api_keys = ["your-proxy-api-key"]

# Routing configuration
[routing]
default_provider = "openai"

# ── Providers ──

[providers.openai]
kind = "openai"
api_key = "sk-your-openai-key"
priority = 1
models = [
    "gpt-4o",
    "gpt-4o-mini",
    "gpt-4-turbo",
    "o3-mini",
]

[providers.anthropic]
kind = "anthropic"
api_key = "sk-ant-your-anthropic-key"
priority = 2
models = [
    "claude-sonnet-4-6",
    "claude-opus-4-6",
    "claude-haiku-4-5-20251001",
]

[providers.ollama]
kind = "ollama"
base_url = "http://localhost:11434"
priority = 10
models = [
    "llama3:latest",
    "mistral:latest",
    "codellama:latest",
]
