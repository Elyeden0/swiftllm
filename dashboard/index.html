<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>llm-proxy dashboard</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --text: #e0e0e8;
    --muted: #6b6b80;
    --accent: #7c5cff;
    --green: #34d399;
    --orange: #fb923c;
    --red: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    min-height: 100vh;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  header h1 span { color: var(--accent); }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .status .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .card .label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card .value {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .card .sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }
  .value.cost { color: var(--green); }
  .value.errors { color: var(--red); }
  .value.cache { color: var(--orange); }
  h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  th, td {
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  th {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    font-weight: 500;
    background: rgba(255,255,255,0.02);
  }
  tr:last-child td { border-bottom: none; }
  .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
  .bar-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-top: 24px;
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-label {
    min-width: 120px;
    font-size: 13px;
    color: var(--muted);
  }
  .bar-track {
    flex: 1;
    height: 24px;
    background: rgba(255,255,255,0.04);
    border-radius: 6px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.5s ease;
    min-width: 2px;
  }
  .bar-value {
    min-width: 60px;
    text-align: right;
    font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  footer {
    margin-top: 40px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <h1><span>llm</span>-proxy</h1>
  <div class="status">
    <div class="dot"></div>
    <span id="uptime">--</span>
  </div>
</header>

<div class="grid">
  <div class="card">
    <div class="label">Total Requests</div>
    <div class="value" id="total-requests">--</div>
  </div>
  <div class="card">
    <div class="label">Total Cost</div>
    <div class="value cost" id="total-cost">--</div>
  </div>
  <div class="card">
    <div class="label">Cache Hits</div>
    <div class="value cache" id="cache-hits">--</div>
    <div class="sub" id="cache-rate"></div>
  </div>
  <div class="card">
    <div class="label">Errors</div>
    <div class="value errors" id="total-errors">--</div>
  </div>
</div>

<h2>Providers</h2>
<table>
  <thead>
    <tr>
      <th>Provider</th>
      <th>Requests</th>
      <th>Input Tokens</th>
      <th>Output Tokens</th>
      <th>Cost (USD)</th>
      <th>Errors</th>
    </tr>
  </thead>
  <tbody id="providers-table">
    <tr><td colspan="6" style="color: var(--muted); text-align: center;">Loading...</td></tr>
  </tbody>
</table>

<div class="bar-container" id="usage-bars" style="display:none;">
  <h2 style="margin-top:0;">Request Distribution</h2>
  <div id="bar-rows"></div>
</div>

<footer>
  llm-proxy &middot; Refreshes every 2s
</footer>

<script>
const COLORS = ['#7c5cff', '#34d399', '#fb923c', '#f87171', '#60a5fa', '#e879f9'];

function formatUptime(seconds) {
  const d = Math.floor(seconds / 86400);
  const h = Math.floor((seconds % 86400) / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  const parts = [];
  if (d > 0) parts.push(d + 'd');
  if (h > 0) parts.push(h + 'h');
  if (m > 0) parts.push(m + 'm');
  parts.push(s + 's');
  return 'Up ' + parts.join(' ');
}

function formatNumber(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
  return n.toString();
}

async function refresh() {
  try {
    const res = await fetch('/api/stats');
    const data = await res.json();

    document.getElementById('total-requests').textContent = formatNumber(data.total_requests);
    document.getElementById('total-cost').textContent = '$' + data.total_cost_usd.toFixed(4);
    document.getElementById('cache-hits').textContent = formatNumber(data.cache_hits);
    document.getElementById('total-errors').textContent = formatNumber(data.total_errors);
    document.getElementById('uptime').textContent = formatUptime(data.uptime_seconds);

    if (data.total_requests > 0) {
      const rate = ((data.cache_hits / data.total_requests) * 100).toFixed(1);
      document.getElementById('cache-rate').textContent = rate + '% hit rate';
    }

    // Provider table
    const tbody = document.getElementById('providers-table');
    const providers = Object.entries(data.providers || {});

    if (providers.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="color: var(--muted); text-align: center;">No requests yet</td></tr>';
    } else {
      tbody.innerHTML = providers.map(([name, s]) => `
        <tr>
          <td><strong>${name}</strong></td>
          <td class="mono">${formatNumber(s.requests)}</td>
          <td class="mono">${formatNumber(s.input_tokens)}</td>
          <td class="mono">${formatNumber(s.output_tokens)}</td>
          <td class="mono" style="color: var(--green)">$${s.total_cost_usd.toFixed(4)}</td>
          <td class="mono" style="color: ${s.errors > 0 ? 'var(--red)' : 'var(--muted)'}">${s.errors}</td>
        </tr>
      `).join('');
    }

    // Usage distribution bars
    const barContainer = document.getElementById('usage-bars');
    const barRows = document.getElementById('bar-rows');
    if (providers.length > 0) {
      barContainer.style.display = 'block';
      const total = providers.reduce((sum, [, s]) => sum + s.requests, 0);
      barRows.innerHTML = providers.map(([name, s], i) => {
        const pct = total > 0 ? (s.requests / total * 100) : 0;
        return `
          <div class="bar-row">
            <div class="bar-label">${name}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width: ${pct}%; background: ${COLORS[i % COLORS.length]}"></div>
            </div>
            <div class="bar-value">${pct.toFixed(1)}%</div>
          </div>
        `;
      }).join('');
    }
  } catch (e) {
    console.error('Failed to fetch stats:', e);
  }
}

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
