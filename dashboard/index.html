<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>swiftllm dashboard</title>
<link rel="stylesheet" href="/dashboard/styles.css">
</head>
<body>

<div class="app">
  <header>
    <div class="header-left">
      <h1><span class="accent">swift</span>llm</h1>
      <span class="badge">gateway</span>
    </div>
    <div class="status">
      <div class="dot"></div>
      <span id="uptime">--</span>
    </div>
  </header>

  <div class="grid">
    <div class="card">
      <div class="card-icon requests-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
      </div>
      <div class="card-body">
        <div class="label">Total Requests</div>
        <div class="value" id="total-requests">--</div>
      </div>
    </div>
    <div class="card">
      <div class="card-icon cost-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23"></line>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
        </svg>
      </div>
      <div class="card-body">
        <div class="label">Total Cost</div>
        <div class="value cost" id="total-cost">--</div>
      </div>
    </div>
    <div class="card">
      <div class="card-icon cache-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
        </svg>
      </div>
      <div class="card-body">
        <div class="label">Cache Hits</div>
        <div class="value cache" id="cache-hits">--</div>
        <div class="sub" id="cache-rate"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-icon error-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="15" y1="9" x2="9" y2="15"></line>
          <line x1="9" y1="9" x2="15" y2="15"></line>
        </svg>
      </div>
      <div class="card-body">
        <div class="label">Errors</div>
        <div class="value errors" id="total-errors">--</div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Providers</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Provider</th>
            <th>Requests</th>
            <th>Input Tokens</th>
            <th>Output Tokens</th>
            <th>Cost (USD)</th>
            <th>Errors</th>
          </tr>
        </thead>
        <tbody id="providers-table">
          <tr><td colspan="6" class="empty-state">No requests yet</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="section" id="usage-bars" style="display:none;">
    <h2>Request Distribution</h2>
    <div class="bar-container">
      <div id="bar-rows"></div>
    </div>
  </div>

  <footer>
    swiftllm &middot; auto-refreshes every 2s
  </footer>
</div>

<script src="/dashboard/app.js"></script>
</body>
</html>
